databaseChangeLog:
  - changeSet:
      id: 3
      author: your_name
      changes:
        - createTable:
            tableName: columns
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: column_name
                  type: VARCHAR(255)
              - column:
                  name: position
                  type: DOUBLE PRECISION
              - column:
                  name: board_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_column_board
                    references: boards(id)
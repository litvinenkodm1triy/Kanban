databaseChangeLog:
  - changeSet:
      id: 2
      author: your_name
      changes:
        - createTable:
            tableName: boards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: board_name
                  type: VARCHAR(255)
              - column:
                  name: owner_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_board_owner
                    references: users(id)